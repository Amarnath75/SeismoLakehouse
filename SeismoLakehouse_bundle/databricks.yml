    default: true
    workspace:
      host: https://dbc-d14fefc5-d8fc.cloud.databricks.com
    variables:
      catalog: youtube_dev
      schema: dev
      warehouse_id : 70ace0aac148cd5b
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-d14fefc5-d8fc.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/amarvijay75@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/amarvijay75@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: youtube_prod
      schema: prod
      warehouse_id : 70ace0aac148cd5
    permissions:
      - user_name: amarvijay75@gmail.com
